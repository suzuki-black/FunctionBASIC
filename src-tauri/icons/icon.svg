<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c3542"/>
      <stop offset="1" stop-color="#1b2027"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- app tile -->
  <rect x="96" y="96" width="832" height="832" rx="190" fill="url(#tile)"/>
  <rect x="96" y="96" width="832" height="832" rx="190" fill="url(#sheen)"/>
  <rect x="97.5" y="97.5" width="829" height="829" rx="188.5" fill="none" stroke="#000000" stroke-opacity="0.25" stroke-width="3"/>

  <!-- editor window -->
  <rect x="236" y="300" width="552" height="440" rx="44" fill="#12161b"/>
  <rect x="236.5" y="300.5" width="551" height="439" rx="43.5" fill="none" stroke="#3a424d" stroke-width="3"/>
  <!-- title bar dots -->
  <circle cx="280" cy="334" r="12" fill="#5b6573"/>
  <circle cx="318" cy="334" r="12" fill="#5b6573"/>
  <circle cx="356" cy="334" r="12" fill="#5b6573"/>
  <line x1="236" y1="368" x2="788" y2="368" stroke="#2a313a" stroke-width="3"/>

  <!-- code lines (indented = structured), syntax colors -->
  <rect x="276" y="410" width="262" height="26" rx="13" fill="#569cd6"/>
  <rect x="316" y="470" width="300" height="26" rx="13" fill="#b5cea8"/>
  <rect x="356" y="530" width="210" height="26" rx="13" fill="#4ec9b0"/>
  <rect x="316" y="590" width="240" height="26" rx="13" fill="#ce9178"/>
  <rect x="276" y="650" width="150" height="26" rx="13" fill="#569cd6"/>
  <!-- text cursor block -->
  <rect x="442" y="643" width="30" height="40" rx="6" fill="#4ec9b0"/>
</svg>
